<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>GymSync – Home Mock v2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(ellipse at 50% 0%, #0d0d1a 0%, #060608 60%);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Phone shell ── */
    .phone {
      width: 390px; height: 844px;
      background: #0C0C10;
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      display: flex; flex-direction: column;
      box-shadow:
        0 0 0 1px rgba(99,102,241,.12),
        0 0 0 1.5px #1a1a28,
        0 32px 64px rgba(0,0,0,.9),
        0 0 80px rgba(92,92,255,.06);
    }
    .screen { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Header ── */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 22px 24px 16px;
      background: rgba(12,12,16,.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.04);
      flex-shrink: 0;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute; bottom: 0; left: 24px; right: 24px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,.3), transparent);
    }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6366F1, #818CF8);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 12px rgba(99,102,241,.4);
    }
    .logo-icon svg { width: 18px; height: 18px; color: #fff; }
    .logo-text { font-size: 21px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .btn-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #8B8CA8; cursor: pointer;
      transition: all .2s;
    }
    .btn-icon:hover { color: #fff; border-color: rgba(99,102,241,.5); background: rgba(99,102,241,.1); }
    .btn-icon svg { width: 17px; height: 17px; }

    /* ── Sub-header ── */
    .sub-header {
      display: flex; gap: 8px;
      padding: 10px 20px 12px;
      background: rgba(12,12,16,.95);
      backdrop-filter: blur(16px);
      flex-shrink: 0;
    }
    .btn-sub {
      flex: 1; padding: 9px 4px;
      border-radius: 12px;
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .05em;
      cursor: pointer; transition: all .2s; border: 1px solid transparent;
    }
    .btn-sub.custom {
      background: linear-gradient(135deg, rgba(99,102,241,.15), rgba(129,140,248,.08));
      border-color: rgba(99,102,241,.25);
      color: #818CF8;
    }
    .btn-sub.custom:hover { background: linear-gradient(135deg, rgba(99,102,241,.25), rgba(129,140,248,.15)); border-color: rgba(99,102,241,.5); color: #a5b4fc; }
    .btn-sub.skip {
      background: rgba(255,255,255,.03);
      border-color: rgba(255,255,255,.06);
      color: #6B6C84;
    }
    .btn-sub.skip:hover { background: rgba(255,255,255,.06); color: #8B8CA8; }

    /* ── Scroll ── */
    .scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
    .scroll-area::-webkit-scrollbar { display: none; }
    .content { padding: 18px 18px 8px; display: flex; flex-direction: column; gap: 14px; }

    /* ── Day card ── */
    .day-card {
      background: linear-gradient(145deg, #1a1a2e 0%, #16162a 60%, #12121f 100%);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 22px;
      padding: 20px;
      position: relative; overflow: hidden;
    }
    .day-card::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(99,102,241,.2) 0%, transparent 70%);
      pointer-events: none;
    }
    .day-card::after {
      content: '';
      position: absolute; bottom: -20px; left: 20px;
      width: 80px; height: 80px;
      background: radial-gradient(circle, rgba(16,185,129,.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .day-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; position: relative; z-index: 1; }
    .day-label { font-size: 10px; color: #6366F1; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px; }
    .day-title { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -.5px; }
    .day-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
    .badge-hyp {
      background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(129,140,248,.1));
      color: #818CF8;
      font-size: 10px; font-weight: 800;
      padding: 5px 11px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .06em;
      border: 1px solid rgba(99,102,241,.25);
    }
    .btn-edit {
      font-size: 11px; color: #6B6C84;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.07);
      padding: 4px 10px; border-radius: 8px;
      cursor: pointer; transition: all .2s;
    }
    .btn-edit:hover { color: #fff; border-color: rgba(255,255,255,.15); }
    .day-meta { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #6B6C84; position: relative; z-index: 1; }
    .day-meta svg { color: #6366F1; opacity: .7; }
    .dot { width: 3px; height: 3px; background: #3A3A50; border-radius: 50%; }

    /* ── Stats strip ── */
    .stats-strip { display: flex; gap: 10px; }
    .stat-chip {
      flex: 1;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 12px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .stat-val { font-size: 18px; font-weight: 800; color: #fff; }
    .stat-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #6B6C84; }
    .stat-chip.green .stat-val { color: #10B981; }
    .stat-chip.indigo .stat-val { color: #818CF8; }
    .stat-chip.orange .stat-val { color: #F97316; }

    /* ── Weekly split button ── */
    .split-btn {
      width: 100%;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: all .2s; text-align: left;
    }
    .split-btn:hover { background: rgba(99,102,241,.07); border-color: rgba(99,102,241,.25); }
    .split-btn-left { display: flex; align-items: center; gap: 13px; }
    .split-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, rgba(99,102,241,.18), rgba(99,102,241,.06));
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: #818CF8;
    }
    .split-icon svg { width: 19px; height: 19px; }
    .split-title { font-size: 14px; font-weight: 700; color: #fff; }
    .split-sub { font-size: 12px; color: #6B6C84; margin-top: 2px; }
    .chevron { color: #3A3A50; }
    .chevron svg { width: 17px; height: 17px; }

    /* ── Exercise list ── */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .section-title { font-size: 16px; font-weight: 800; color: #fff; }
    .section-count { font-size: 12px; color: #6B6C84; font-weight: 600; }
    .exercise-list { display: flex; flex-direction: column; gap: 8px; }
    .exercise-row {
      display: flex; align-items: center;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 14px;
      padding: 11px 13px;
      transition: border-color .2s, background .2s;
      cursor: pointer;
    }
    .exercise-row:hover { background: rgba(99,102,241,.06); border-color: rgba(99,102,241,.2); }
    .ex-num {
      width: 34px; height: 34px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #6B6C84; font-weight: 800; font-size: 13px;
      margin-right: 12px; flex-shrink: 0;
    }
    .ex-info { flex: 1; min-width: 0; }
    .ex-name { font-weight: 700; color: #e8e8f0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ex-sub { font-size: 11px; color: #6B6C84; margin-top: 2px; }
    .btn-play {
      width: 30px; height: 30px;
      background: rgba(99,102,241,.12);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #818CF8; cursor: pointer; margin-left: 10px; flex-shrink: 0;
      transition: all .2s;
    }
    .btn-play:hover { background: rgba(99,102,241,.25); color: #a5b4fc; }
    .btn-play svg { width: 12px; height: 12px; margin-left: 1px; }

    /* ── Bottom CTA ── */
    .bottom-cta {
      padding: 12px 18px 14px;
      background: linear-gradient(to top, #0C0C10 70%, transparent);
      flex-shrink: 0; z-index: 20;
    }
    .btn-start {
      width: 100%;
      background: linear-gradient(135deg, #5C5CFF 0%, #7C3AED 100%);
      color: #fff;
      font-size: 16px; font-weight: 900;
      padding: 17px;
      border: none; border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(92,92,255,.4), 0 1px 0 rgba(255,255,255,.1) inset;
      transition: all .2s;
      letter-spacing: .06em;
      position: relative; overflow: hidden;
    }
    .btn-start::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      transition: left .5s;
    }
    .btn-start:hover::before { left: 150%; }
    .btn-start:hover { box-shadow: 0 6px 32px rgba(92,92,255,.55), 0 1px 0 rgba(255,255,255,.1) inset; }
    .btn-start:active { transform: scale(.98); }

    /* ── Bottom Nav ── */
    .bottom-nav {
      flex-shrink: 0; height: 66px;
      background: rgba(14,14,20,.98);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,.04);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 8px; z-index: 50;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; width: 60px; height: 100%;
      color: #4A4A60; cursor: pointer; transition: color .2s;
      border: none; background: none;
    }
    .nav-item:hover { color: #8B8CA8; }
    .nav-item.active { color: #818CF8; }
    .nav-item.active svg { filter: drop-shadow(0 0 6px rgba(129,140,248,.5)); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; font-weight: 700; letter-spacing: .02em; }
  </style>
</head>
<body>
<div class="phone"><div class="screen">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.4 14.4 9.6 9.6"/>
          <path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/>
          <path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/>
          <path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/>
        </svg>
      </div>
      <span class="logo-text">GymSync</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </button>
    </div>
  </header>

  <!-- Sub-header -->
  <div class="sub-header">
    <button class="btn-sub custom">✦ Custom Workout</button>
    <button class="btn-sub skip">Skip Workout</button>
  </div>

  <!-- Scroll -->
  <div class="scroll-area"><div class="content">

    <!-- Day card -->
    <div class="day-card">
      <div class="day-card-top">
        <div>
          <div class="day-label">Today's Workout</div>
          <div class="day-title">Push Day</div>
        </div>
        <div class="day-badges">
          <span class="badge-hyp">Hypertrophy</span>
          <button class="btn-edit">Edit</button>
        </div>
      </div>
      <div class="day-meta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.4 14.4 9.6 9.6"/>
          <path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/>
          <path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/>
          <path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/>
        </svg>
        <span>5 Exercises</span>
        <div class="dot"></div>
        <span>~65 mins</span>
        <div class="dot"></div>
        <span style="color:#10B981;font-weight:700;">+12% vol</span>
      </div>
    </div>

    <!-- Stats strip -->
    <div class="stats-strip">
      <div class="stat-chip green">
        <span class="stat-val">12</span>
        <span class="stat-lbl">Streak</span>
      </div>
      <div class="stat-chip indigo">
        <span class="stat-val">142</span>
        <span class="stat-lbl">Workouts</span>
      </div>
      <div class="stat-chip orange">
        <span class="stat-val">34k</span>
        <span class="stat-lbl">Vol (kg)</span>
      </div>
    </div>

    <!-- Weekly split -->
    <button class="split-btn">
      <div class="split-btn-left">
        <div class="split-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div>
          <div class="split-title">Manage Weekly Split</div>
          <div class="split-sub">Configure your 7-day routine</div>
        </div>
      </div>
      <div class="chevron">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </button>

    <!-- Exercise list -->
    <div>
      <div class="section-header">
        <span class="section-title">Plan for today</span>
        <span class="section-count">5 exercises</span>
      </div>
      <div class="exercise-list" id="exerciseList"></div>
    </div>

  </div></div>

  <!-- Start CTA -->
  <div class="bottom-cta">
    <button class="btn-start">START WORKOUT</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
      <span class="nav-label">History</span>
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>
      <span class="nav-label">Nutrition</span>
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      <span class="nav-label">Progress</span>
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="nav-label">Profile</span>
    </button>
  </nav>

</div></div>

<script>
  const EXERCISES = [
    { name: 'Barbell Bench Press', muscle: 'Chest',     target: '4 × 8-10' },
    { name: 'Overhead Press',      muscle: 'Shoulders', target: '3 × 8-12' },
    { name: 'Incline DB Press',    muscle: 'Chest',     target: '3 × 10-12' },
    { name: 'Tricep Pushdown',     muscle: 'Triceps',   target: '3 × 12-15' },
    { name: 'Lateral Raises',      muscle: 'Shoulders', target: '4 × 15-20' },
  ];

  const list = document.getElementById('exerciseList');
  EXERCISES.forEach((ex, i) => {
    list.innerHTML += `
      <div class="exercise-row">
        <div class="ex-num">${i + 1}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sub">${ex.muscle} · ${ex.target}</div>
        </div>
        <button class="btn-play">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
      </div>`;
  });
</script>
</body>
</html>
